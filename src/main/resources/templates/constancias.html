<!DOCTYPE html>
<html lang="es" class="light-style layout-menu-fixed" dir="ltr" data-theme="theme-default" data-assets-path="/assets/" data-template="vertical-menu-template-free">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>Constancias - SiReSe Admin</title>
    <link rel="icon" type="image/x-icon" href="/assets/img/favicon/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/vendor/fonts/boxicons.css" />
    <link rel="stylesheet" href="/assets/vendor/css/core.css" class="template-customizer-core-css" />
    <link rel="stylesheet" href="/assets/vendor/css/theme-default.css" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="/assets/css/demo.css" />
    <link rel="stylesheet" href="/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />
    <script src="/assets/vendor/js/helpers.js"></script>
    <script src="/assets/js/config.js"></script>
</head>

<body>
<div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
        <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
            <div class="app-brand demo">
                <a href="admin" class="app-brand-link">
                    <span class="app-brand-text demo menu-text fw-bolder ms-2">SiReSe</span>
                </a>
            </div>
            <ul class="menu-inner py-1">
                <li class="menu-item"><a href="admin" class="menu-link"><i class="menu-icon tf-icons bx bx-home-circle"></i> Inicio</a></li>
                <li class="menu-item"><a href="aspirantes" class="menu-link"><i class="menu-icon tf-icons bx bx-group"></i> Aspirantes</a></li>
                <li class="menu-item active"><a href="constancias" class="menu-link"><i class="menu-icon tf-icons bx bx-file"></i> Constancias</a></li>
            </ul>
        </aside>

        <div class="layout-page">
            <div class="content-wrapper">
                <div class="container-xxl flex-grow-1 container-p-y">
                    <h4 class="fw-bold py-3 mb-4">Emisión de Constancias</h4>

                    <div class="card mb-4 p-4 text-center">
                        <img src="/assets/img/logo_ipn.jpg" alt="Logo IPN" style="width: 120px; margin: 0 auto;">
                        <h5 class="mt-3">INSTITUTO POLITÉCNICO NACIONAL</h5>
                        <p>UPIIZ - UNIDAD PROFESIONAL INTERDISCIPLINARIA DE INGENIERÍA CAMPUS ZACATECAS</p>
                    </div>

                    <div class="card">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                    <tr>
                                        <th>Nombre del Aspirante</th>
                                        <th>Carrera</th>
                                        <th>Acciones</th>
                                    </tr>
                                    </thead>
                                    <tbody id="tbody-constancias"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/assets/vendor/libs/jquery/jquery.js"></script>
<script>
    $(document).ready(function() {
      $.get('/api/aspirantes', function(data) {
        let rows = '';
        data.forEach(a => {
          rows += `<tr>
            <td><strong>${a.nombre}</strong></td>
            <td>${a.carrera ? a.carrera.nombre : 'Sin asignar'}</td>
            <td>
              <a href="/api/aspirantes/pdf/${a.id}" class="btn btn-sm btn-outline-danger" target="_blank">
                <i class="bx bxs-file-pdf"></i> Generar Constancia
              </a>
            </td>
          </tr>`;
        });
        $('#tbody-constancias').html(rows);
      });
    });
</script>
</body>
</html>
